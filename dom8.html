<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number picker</title>
    <style>

    </style>
</head>
<body>
   <h2 id="result">Guess a number(1-10)</h2> 
   <input type="number" id="input" placeholder="Enter a num"/>
   <button id="btn">Check</button>
<script>
let h2 = document.querySelector("#result");
let input = document.querySelector("#input");
let button = document.querySelector("#btn");

let randomNumber = Math.floor(Math.random() * 10) + 1;

button.addEventListener("click", () => {
    let number = Number(input.value);

    if (number > randomNumber) {
        h2.innerText = "Too high";
    } else if (number < randomNumber) {
        h2.innerText = "Too low";
    } else if (number === randomNumber) {
        h2.innerText = "Correct 🎉";
    } else {
        h2.innerText = "Invalid number";
    }
});
</script>
</body>
</html>
