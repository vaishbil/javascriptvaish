<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Counter</title>
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: beige;
        font-family: Arial, sans-serif;
      }
      .container {
        background-color: white;
        text-align: center;
      }
      textarea {
        width: 100%;
        height: 100px;
        margin-top: 10px;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
        resize: none;
      }
      #counter {
        margin-top: 10px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h2>Character Counter</h2>
      <textarea
        id="textInput"
        placeholder="write Something"
        maxlength="100"
      ></textarea>
      <p id="counter">0/100</p>
    </div>
    <script>
      let div = document.getElementById("container");
      let textarea = document.getElementById("textInput");
      let p = document.querySelector("#counter");

      textarea.addEventListener("input", () => {
        let text = textarea.value;

        let count = text.length;
        let max = 100;
        p.innerText = count + " / " + max;
        // color change based on count
        if (count >= 100) {
          p.style.color = "red";
        } else if (count >= 80) {
          p.style.color = "orange";
        } else {
          p.style.color = "black";
        }
      });
    </script>
    <!-- <script src="/javascript//dom3.js"></script> -->
  </body>
</html>
