
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: wheat;
            display: flex;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        #input {
            color: black;
            background-color: beige;
            height: 35px;
            width: 220px;
            border: none;
            border-radius: 5px;
            padding: 5px;
            margin-right: 10px;
            
        }
        #btn {
            height: 35px;
            color: beige;
            background-color: chocolate;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #container {
            background: whitesmoke;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        li {
           list-style: none;
           background: #f5f5f5;
           margin-top: 10px;
           padding: 8px 10px;
           border-radius: 5px;
           display: flex;
           justify-content: space-between;
           align-items: center;
        }
        #forList {
           margin-top: 15px;
           width: 100%;
        }
        .completed {
           text-decoration: line-through;
           opacity: 0.6;
        }
    </style>
</head>
<body>
    <div id="container">
    <h1>To Do list App</h1>
    <input type="text" placeholder="type something" id="input"/>
    <button id="btn">ADD TASK</button>
    <div id="forList"></div>
    </div>
    <script>
        let input = document.getElementById("input");
let button = document.getElementById("btn");
let div = document.getElementById("forList");

button.addEventListener("click", () => {
    let text = input.value;

    // prevent empty tasks
    if (text === "") return;

    // create task
    let li = document.createElement("li");
    li.innerText = text;
    // for marking as completed (line through)
    li.addEventListener("click", () => {
        li.classList.toggle("completed");
    });

    // create delete button
    let delBtn = document.createElement("button");
    delBtn.innerText = "Delete";
    delBtn.style.backgroundColor = "chocolate";
    delBtn.style.color = "beige";
    delBtn.style.padding = "5px 10px";
    delBtn.style.marginLeft = "10px";
    delBtn.style.border = "none";
    delBtn.style.borderRadius = "5px";
    delBtn.style.cursor = "pointer";
    // add delete functionality
    delBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        li.remove();
    });

    // append button inside task
    li.appendChild(delBtn);  // means put the button inside the li 

    // add task to list
    div.appendChild(li);

    // clear input
    input.value = "";
});
    </script>
    
</body>
</html>
